name: Poll Congress Trades

on:
  schedule:
    # Every 30 minutes. Note: GitHub may delay scheduled runs by 5-30 min
    # during peak load on the free tier, so actual cadence ≈ 30-60 min.
    - cron: '*/30 * * * *'
  workflow_dispatch:  # allows manual trigger from the Actions tab

permissions:
  contents: write  # needed to commit notified_trades.json back to the repo

# Prevent overlapping runs (e.g. a slow manual run + a cron tick)
concurrency:
  group: poll-trades
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poll
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cron.py

      - name: Commit updated notified_trades.json
        run: |
          if [ -n "$(git status --porcelain notified_trades.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add notified_trades.json
            git commit -m "Update notified trades [skip ci]"
            # In case another run pushed first, rebase then push
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          else
            echo "No changes to commit"
          fi
